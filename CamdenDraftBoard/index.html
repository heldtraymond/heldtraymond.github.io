    <style>
        @font-face {
            font-family: 'Meadow';
            src: url('fonts/MeadowRegular.woff2') format('woff2'),
                 url('fonts/MeadowRegular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Franklin';
            src: url('fonts/Franklin Gothic Condensed.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        #fullScreen {
            background-color:#8888ff;
            color:white;
            border:3px solid #000066;
            border-radius:5px;
            font-family: 'Arial';
            font-weight: bold;
            font-size:12pt;
            padding:7px; 
            cursor:pointer;
        }
        #clearPicks {
            background-color:white;
            color:red;
            border:3px solid red;
            border-radius:5px;
            font-family: 'Arial';
            font-weight: bold;
            font-size:12pt;
            cursor:pointer;
            padding:7px; 
        }
        .ownerName input {
            font-family: 'Meadow';
            font-weight: 600;
            letter-spacing:1.7px;
            line-height:0.7em;
            text-align:center;
            font-size:40pt;
            border:none;
            background-color:#008800;
            width:100%;
            color:white;
        }
        .roundNum {
            font-family: 'Franklin';
            font-weight: normal;
            font-size:24pt;
            color:white;
        }
        .roundNumLeft {
            text-align:center;
        }
        .roundNumRight {
            text-align:center;
        }
        #draftBoard {
            width:100%;
            border-collapse: collapse;
        }
        .draftSlotInput {
            border:none;
            text-align:center;
            font-family: 'Franklin';
            width:100%;
            color:black;
            font-size:24pt;
            position:relative;
            top:0px;
            left:0px;
            background-color:#ffffff;
            padding:0px;
            padding-block:0px;
            padding-inline:0px;
            height:0.92em;
        }
        .draftSlotInput:not(.QB,.RB,.WR,.TE,.K,.DEF) {
            font-family: 'Meadow';
            background-color:white;
            font-size:24pt;
            letter-spacing:-1px;
            color:black;
            height:1.5em;
        }
        .draftSlotInput.manualName {
            font-family: 'Meadow';
            background-color:white;
            font-size:24pt;
            letter-spacing:0px;
            color:black;
        }
        .roundInProgress {
            /*background-color:#77ee99 !important;*/
            background-color:#7799ee !important;
        }
        .draftSlot:hover {
            background-color:#ff8833;
            border:3px solid #ff8833
        }
        .draftSlot.selected {
            background-color:#ff8833;
        }
        /*.draftSlot:hover .draftSlotInput {
            background-color:#bbbbff;
        }*/
        .draftSlot.selected .draftSlotInput {
            background-color:#ff8833;
            font-family:'Meadow';
        }
        .draftSlot:hover:not(.QB,.RB,.WR,.TE,.K,.DEF) .draftSlotInput {
            background-color:#ff8833;
        }
        .altColorSlot .draftSlotInput {
            background-color:#eeeeee;
        }
        .draftSlot {
            background-color:#ffffff;
            border:3px solid #008800;
            width:10%;
        }
        .altColorSlot {
            background-color:#eeeeee;
        }
        #openFile {
            width: 30px;
        }
        .QB {
            background-color:#ff0000;
            color:white;
        }
        .WR {
            background-color:#000000;
            color:white;
        }
        .altColorSlot .QB {
            background-color:#ff0000;
            color:white;
        }
        .altColorSlot .WR {
            background-color:#000000;
            color:white;
        }
        .RB {
            background-color:#0000ff;
            color:white;
        }
        .altColorSlot .RB {
            background-color:#0000ff;
            color:white;
        }
        .DEF {
            background-color:#ffdd00;
            color:black;
        }
        .TE {
            background-color:#66ff66;
            color:black;
        }
        .K {
            /*background-color:#ff9944;*/
            background-color:#aaaaaa;
            color:black;
        }
        .altColorSlot .DEF {
            background-color:#ffdd00;
            color:black;
        }
        .altColorSlot .TE {
            background-color:#66ff66;
            color:black;
        }
        .altColorSlot .K {
            background-color:#aaaaaa;
            color:black;
        }
        .team {
            float:left;
            font-size:7pt;
            margin-left:2px;
            text-align:right;
            font-family: 'Arial';
        }
        .firstName {
            width:68%;
            display:inline-block;
            font-size:12pt;
            text-align:center;
            font-family: 'Franklin';
            font-weight:normal;
        }
        .position {
            float:right;
            margin-right:2px;
            font-size:7pt;
            text-align:right;
            font-family: 'Arial';
        }

        function ToggleOpenFile() {
            $("#openFile").toggle();
        }

        $("#openFile").on("change", function(e) {
            console.log("CHANGE");

            var _FirstFile = e.target.files[0];
            var _Reader = new FileReader();
            _Reader.onload = function(e) {
                var _ConvertedArray = new Uint8Array(e.target.result);

                var _String = "";

                for (var i = 0; i < _ConvertedArray.length; i++) {
                    _String += String.fromCharCode(_ConvertedArray[i]);
                }

                DRAFT_PICKS = JSON.parse(_String);
                RedisplayDraftPickData();

                $("#openFile").hide();
                $("#openFile").val(null);
            };

            _Reader.readAsArrayBuffer(_FirstFile);
        });

        function LoadHtmlFields() {
            $("#ownerNames").append("<td></td>");
            for (var j = 0; j < NUM_ROUNDS; j++) {
                $("#round" + (j+1)).append("<td class='roundNum roundNumLeft'>" + (j+1) + "</td>");
                for (var i = 0; i < DRAFT_PICKS.length; i++) {
                    var draftSlotNum = (j*DRAFT_PICKS.length) + (j % 2 == 0 ? (i+1) : (DRAFT_PICKS.length-i));
                    $("#round" + (j+1)).append("<td onclick='SelectSlot(" + draftSlotNum + ")' id='draftSlot" + draftSlotNum + "' class='draftSlot" /*+ (i % 2 == 0 ? " altColorSlot" : "")*/ + "'><span class='position'></span><span class='firstName'></span><span class='team'></span><br><input type='text' class='draftSlotInput' onfocus='SelectSlot(" + draftSlotNum + ")' onkeydown='SlotKeyPress(event," + draftSlotNum + ")' onblur='DeselectSlot(event, " + draftSlotNum + ")' id='draftSlotInput" + draftSlotNum + "' /></td>");

                    if (j == 0) {
                        $("#ownerNames").append("<td class='ownerName'><input type='text' value='" + DRAFT_PICKS[i].name + "' onchange='NewOwnerName(" + i + ")' /></td>");
                    }
                }
                $("#round" + (j+1)).append("<td class='roundNum roundNumRight'>" + (j+1) + "</td>");
            }

            console.log("deselect");
            var roundIndex = Math.floor(slotNum / 10);
            var slotInRound = Math.floor((slotNum - 1) % 10);
            var teamIndex = (roundIndex % 2 == 0 ? slotInRound : (DRAFT_PICKS.length - 1 - slotInRound));

            if ($("#draftSlotInput" + slotNum).attr("prevVal") == $("#draftSlotInput" + slotNum).val()) {
                $(".draftSlot").removeClass("selected");

            }
            $("#draftSlot" + slotNum).removeClass("selected");
            $("#draftSlot" + slotNum).removeClass("QB");
            $("#draftSlot" + slotNum).removeClass("RB");
            $("#draftSlot" + slotNum).removeClass("WR");

            $("#draftSlot" + slotNum).removeClass("K");
            $("#draftSlot" + slotNum).removeClass("DEF");
            $("#draftSlotInput" + slotNum).removeClass("QB");
            $("#draftSlotInput" + slotNum).removeClass("RB");
            $("#draftSlotInput" + slotNum).removeClass("WR");
            $("#draftSlotInput" + slotNum).removeClass("TE");
            $("#draftSlotInput" + slotNum).removeClass("K");
            $("#draftSlotInput" + slotNum).removeClass("DEF");
            $("#draftSlotInput" + slotNum).removeClass("longName");
            $("#draftSlotInput" + slotNum).removeClass("veryLongName");
            $("#draftSlotInput" + slotNum).removeClass("veryVeryLongName");
            $("#draftSlotInput" + slotNum).removeClass("manualName");

            $("#draftSlot" + slotNum + " .team").html("");
            $("#draftSlot" + slotNum + " .position").html("");
            $("#draftSlot" + slotNum + " .firstName").html("");

            if ($("#draftSlotInput" + slotNum).val() == "") {
                var prevPick = DRAFT_PICKS[teamIndex].picks[roundIndex];
                DRAFT_PICKS[teamIndex].picks[roundIndex] = null;
                localStorage.setItem("DRAFT_PICKS_DATA", JSON.stringify(DRAFT_PICKS));
                return;
            }

            var pickText = $("#draftSlotInput" + slotNum).val();
            pickText = pickText.toLowerCase().replace(" jr","").replace(" sr","").replace(" iii","").replace(" ii","").replace("  ", " ").replace("'","").replace(".","").replace(".","").replace("-","").replace(",","").trim();

            console.log(pickText);

            for (var i = 0; i < PLAYER_DATA.length; i++) {
                var checkName = PLAYER_DATA[i].first + " " + PLAYER_DATA[i].last;
                checkName = checkName.toLowerCase().replace("'","").replace(".","").replace(".","").replace("-","").replace(",","").replace(" jr","").replace(" sr","").replace(" iii","").replace(" ii","").trim();

                if (checkName.indexOf(pickText) >= 0 && !AlreadyPicked(PLAYER_DATA[i].id, slotNum)) {
                    $("#draftSlot" + slotNum).addClass(PLAYER_DATA[i].position);
                    $("#draftSlotInput" + slotNum).addClass(PLAYER_DATA[i].position);

                    $("#draftSlotInput" + slotNum).val(PLAYER_DATA[i].last);
                    $("#draftSlot" + slotNum + " .firstName").html(PLAYER_DATA[i].first.toUpperCase());
                    $("#draftSlot" + slotNum + " .team").html(PLAYER_DATA[i].team);
                    $("#draftSlot" + slotNum + " .position").html(PLAYER_DATA[i].position);

                    if (PLAYER_DATA[i].last.length > 13 || (PLAYER_DATA[i].last.length > 10 && PLAYER_DATA[i].position == "DEF")) {
                        $("#draftSlotInput" + slotNum).addClass("veryVeryLongName");
                    }
                    else if (PLAYER_DATA[i].last.length > 11 || (PLAYER_DATA[i].last.length > 9 && PLAYER_DATA[i].position == "DEF")) {
                        $("#draftSlotInput" + slotNum).addClass("veryLongName");
                    }
                    else if (PLAYER_DATA[i].last.length > 9 || (PLAYER_DATA[i].last.length > 8 && PLAYER_DATA[i].position == "DEF")) {
                        $("#draftSlotInput" + slotNum).addClass("longName");
                    }

                    DRAFT_PICKS[teamIndex].picks[roundIndex] = PLAYER_DATA[i];
                    DRAFT_PICKS[teamIndex].picks[roundIndex].slotNum = slotNum;

                    localStorage.setItem("DRAFT_PICKS_DATA", JSON.stringify(DRAFT_PICKS));

                    return;
                }
            }

            DRAFT_PICKS[teamIndex].picks[roundIndex] = {manualName: $("#draftSlotInput" + slotNum).val()};

            $("#draftSlotInput" + slotNum).addClass("manualName");
            localStorage.setItem("DRAFT_PICKS_DATA", JSON.stringify(DRAFT_PICKS));
        }

        function AlreadyPicked(id, slotNum) {
            for (var i = 0; i < DRAFT_PICKS.length; i++) {
                for (var p = 0; p < DRAFT_PICKS[i].picks.length; p++) {
                    var pick = DRAFT_PICKS[i].picks[p];
                    if (pick != null) {
                        if (typeof pick.id != "undefined" && pick.id == id) {
                            if (typeof pick.slotNum != "undefined" && pick.slotNum == slotNum) {
                                return false;
                            }
                            return true;
                        }                        
                    }
                }
            }

            return false;
        }
